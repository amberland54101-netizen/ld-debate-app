<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LD Rebuttal Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    textarea, select {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 16px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 6px;
      white-space: pre-wrap;
      min-height: 150px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LD Debate Rebuttal Assistant</h1>

    <label>Flow Input</label>
    <textarea id="flow" rows="10" placeholder="Paste your debate flow here..."></textarea>

    <label>Speech</label>
    <select id="speech">
      <option value="1AR">1AR</option>
      <option value="NR">NR</option>
      <option value="2AR">2AR</option>
    </select>

    <label>Strategy (optional)</label>
    <textarea id="strategy" rows="3" placeholder="Collapse, key arguments, etc."></textarea>

    <button onclick="generateRebuttal()">Generate</button>

    <div id="output">Your rebuttal will appear here.</div>
  </div>

  <script>
    async function generateRebuttal() {
      const flow = document.getElementById("flow").value.trim();
      const speech = document.getElementById("speech").value;
      const strategy = document.getElementById("strategy").value.trim();
      const output = document.getElementById("output");

      if (!flow) {
        output.innerText = "Please enter your flow first.";
        return;
      }

      output.innerText = "Generating...";

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            flow,
            speech,
            strategy
          })
        });

        const data = await res.json();

        if (!res.ok) {
          output.innerText = data.error || "Something went wrong.";
          return;
        }

        output.innerText = data.output || "No response returned.";
      } catch (err) {
        output.innerText = "Request failed: " + err.message;
      }
    }
  </script>
</body>
</html>
